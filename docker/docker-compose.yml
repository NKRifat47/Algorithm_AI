version: "3.9"

services:
  backend:
    image: nkrifat47/algorithm-ai-backend:1.0
    container_name: algorithm-ai-backend
    ports:
      - "5000:5000"
      - "5555:5555"
    env_file:
      - ../.env.docker
    depends_on:
      - postgres
      - redis
    restart: always

  postgres:
    image: postgres:15
    container_name: algorithm-ai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: algorithm_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: algorithm-ai-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: